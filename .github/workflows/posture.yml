name: posture

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Gate the templates with vibe-ios-doctor (strict)
        run: python bin/vibe-ios-doctor --strict templates/
      - name: Tests
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest tests/ -q
